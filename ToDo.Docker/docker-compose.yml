# =============================================================================
# ToDo Docker Compose
# =============================================================================
# Spins up the full ToDo stack: SQL Server 2022 and the Agent Factory API.
#
# HOW TO RUN:
#   Start (build images and run in background):
#     docker compose -f docker-compose.yml up -d --build
#
#   Start (use cached images):
#     docker compose -f docker-compose.yml up -d
#
#   Stop:
#     docker compose -f docker-compose.yml down
#
#   Stop and remove volumes (full reset):
#     docker compose -f docker-compose.yml down -v
#
#   View logs:
#     docker compose -f docker-compose.yml logs -f
#
#   View logs for a specific service:
#     docker compose -f docker-compose.yml logs -f agentfactory
#
# ACCESS:
#   Agent Factory API:  http://localhost:5000
#   Swagger UI:         http://localhost:5000/swagger
#   SQL Server:         localhost:1433  (user: sa, password: P@ssword2026)
#
# NOTE:
#   The Agent Factory API waits for SQL Server to pass its health check before starting.
#   First startup may take ~40s while SQL Server initialises.
# =============================================================================

name: ToDo

services:
  # ---------------------------------------------------------------------------
  # SQL Server 2022 — primary relational database
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ToDo-sqlserver
    environment:
      - ACCEPT_EULA=Y                      # Required by Microsoft to use the image
      - MSSQL_SA_PASSWORD=P@ssword2026     # SA (system admin) password
      - MSSQL_PID=Developer                # Use the free Developer edition
    ports:
      - "1433:1433"                        # Expose SQL Server on the default port
    volumes:
      - sqlserver-data:/var/opt/mssql                                      # Persist database files
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql              # Run init script on first start
    networks:
      - ToDo-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssword2026" -C -Q "SELECT 1" || exit 1
      interval: 10s        # Check every 10 seconds
      timeout: 3s          # Fail if no response within 3 seconds
      retries: 10          # Retry up to 10 times before marking unhealthy
      start_period: 40s    # Grace period for SQL Server to initialise before checks begin

  # ---------------------------------------------------------------------------
  # Agent Factory API — ASP.NET Core web API
  # ---------------------------------------------------------------------------
  agentfactory:
    build:
      context: ..                                                    # Build context is the repo root
      dockerfile: ToDo.Factory/src/ToDo.API/Dockerfile
    container_name: ToDo-factory
    ports:
      - "5000:5000"                        # Expose the API on port 5000
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000      # Listen on all interfaces on port 5000
      - ConnectionStrings__appdb=Server=sqlserver;Database=ToDo-db;User Id=sa;Password=P@ssword2026;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy         # Only start after SQL Server passes its health check
    networks:
      - ToDo-network
    healthcheck:
      test: curl --fail http://localhost:5000/health || exit 1
      interval: 30s        # Check every 30 seconds
      timeout: 3s          # Fail if no response within 3 seconds
      retries: 3           # Retry up to 3 times before marking unhealthy
      start_period: 40s    # Grace period for the API to start before checks begin

networks:
  ToDo-network:
    driver: bridge         # Standard bridge network for inter-service communication

volumes:
  sqlserver-data:
    driver: local          # Store SQL Server data on the local host filesystem